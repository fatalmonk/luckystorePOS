name: Storefront CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/customer_storefront/**'
      - 'supabase/migrations/**'
      - '.github/workflows/storefront.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/customer_storefront/**'
      - 'supabase/migrations/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint --workspace=customer_storefront

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: cd apps/customer_storefront && npx tsc --noEmit

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      CI: true
      HAS_SUPABASE_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Supabase Preview Branch
        if: env.HAS_SUPABASE_TOKEN == 'true'
        id: supabase_preview
        uses: 0xbigboss/supabase-branch-gh-action@v1
        with:
          supabase-access-token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          supabase-project-id: 'hvmyxyccfnkrbxqbhlnm'

      - name: Set environment variables for preview branch
        run: |
          if [ -n "${{ steps.supabase_preview.outputs.api_url }}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ steps.supabase_preview.outputs.api_url }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ steps.supabase_preview.outputs.anon_key }}" >> $GITHUB_ENV
            echo "SUPABASE_SERVICE_ROLE_KEY"="${{ steps.supabase_preview.outputs.service_role_key }}" >> $GITHUB_ENV
          else
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
            echo "SUPABASE_SERVICE_ROLE_KEY"="${{ secrets.SUPABASE_SERVICE_KEY }}" >> $GITHUB_ENV
          fi
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run build --workspace=customer_storefront
      - run: cd apps/customer_storefront && npx playwright test --project=chromium

  deploy:
    runs-on: ubuntu-latest
    # Run only if lint and typecheck succeed
    needs: [lint, typecheck]
    env:
      HAS_SUPABASE_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && 'production' || 'preview' }}
        env:
          VERCEL_ORG_ID: team_I8viHUKz1JdI0cvVQviLZnLC
          VERCEL_PROJECT_ID: prj_OXYSWyhB0307xKWe7BYSoZ2C1VIh
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      
      - name: Fetch Supabase Preview Branch
        if: github.event_name == 'pull_request' && env.HAS_SUPABASE_TOKEN == 'true'
        id: supabase_preview
        uses: 0xbigboss/supabase-branch-gh-action@v1
        with:
          supabase-access-token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          supabase-project-id: 'hvmyxyccfnkrbxqbhlnm'
      
      - name: Build
        run: vercel build --target=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && 'production' || 'preview' }}
        env:
          VERCEL_ORG_ID: team_I8viHUKz1JdI0cvVQviLZnLC
          VERCEL_PROJECT_ID: prj_OXYSWyhB0307xKWe7BYSoZ2C1VIh
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ github.event_name == 'pull_request' && steps.supabase_preview.outputs.api_url || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ github.event_name == 'pull_request' && steps.supabase_preview.outputs.anon_key || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      
      - name: Deploy to Preview
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt
        env:
          VERCEL_ORG_ID: team_I8viHUKz1JdI0cvVQviLZnLC
          VERCEL_PROJECT_ID: prj_OXYSWyhB0307xKWe7BYSoZ2C1VIh
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prebuilt --prod
        env:
          VERCEL_ORG_ID: team_I8viHUKz1JdI0cvVQviLZnLC
          VERCEL_PROJECT_ID: prj_OXYSWyhB0307xKWe7BYSoZ2C1VIh
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
