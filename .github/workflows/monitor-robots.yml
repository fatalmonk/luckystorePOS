name: Monitor robots.txt
on:
  schedule:
    - cron: '0 * * * *' # every hour
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --no-save
      - run: node scripts/monitor-robots.js
      - uses: actions/upload-artifact@v4
        with:
          name: robots-log
          path: scripts/robots.log
