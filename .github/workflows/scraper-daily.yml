name: Daily Competitor Price Scraper

on:
  schedule:
    # 2 AM Bangladesh time (UTC+6) = 8 PM UTC previous day
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
      # Service role key used to write scraped data to the database
      SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
      STORE_ID: "${{ secrets.STORE_ID }}"
      CHROME_BIN: /usr/bin/google-chrome
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/scraper/package-lock.json

      - name: Install dependencies
        working-directory: apps/scraper
        run: npm ci

      - name: Run Chaldal scraper
        working-directory: apps/scraper
        run: node scrape-chaldal.js

      - name: Run Shwapno scraper
        working-directory: apps/scraper
        run: node scrape-shwapno.js

      - name: Check price alerts
        working-directory: apps/scraper
        env:
          ALERT_THRESHOLD: '0.15'
        run: node check-price-alerts.js
