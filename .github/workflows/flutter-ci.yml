name: Flutter CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile_app/**'
      - 'supabase/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile_app/**'

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/mobile_app/.dart_tool
            ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('apps/mobile_app/pubspec.lock') }}-${{ github.run_id }}
          restore-keys: |
            flutter-${{ runner.os }}-${{ hashFiles('apps/mobile_app/pubspec.lock') }}
            flutter-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env for analysis
        run: |
          cp .env.example .env
          sed -i.bak 's|your-anon-key-here|eyJhbG...r-ci|g' .env
          rm .env.bak

      - name: Verify Flutter installation
        run: flutter doctor

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test --no-pub || true

  build-android:
    name: Build Android APK
    needs: analyze-and-test
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env for build
        run: |
          cp .env.example .env
          sed -i.bak 's|your-anon-key-here|eyJhbG...ummy|g' .env
          rm .env.bak

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: apps/mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Get pubspec version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Lucky Store POS v${{ steps.version.outputs.version }}
          body: |
            ## Android Release Build

            **Version:** ${{ steps.version.outputs.version }}
            **Built from:** ${{ github.ref }} @ ${{ github.sha }}
            **Flutter:** 3.41.0
            **Min Android:** API 23 (Android 6.0+)

            ### Installation
            Download `app-release.apk` below and sideload on your device.
          files: apps/mobile_app/build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}