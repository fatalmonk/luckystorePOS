<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucky Store — Final Primary Logo -->
<!-- Flat trapezoid bag, serif L, leaf behind handle, bold wordmark -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Flat terracotta -->
    <solidColor id="terracotta" solid-color="#C75B3A"/>
    <!-- Darker terracotta for handle shadow/depth -->
    <solidColor id="terracotta-dark" solid-color="#A84A2F"/>
    <!-- Fresh leaf green -->
    <solidColor id="leaf" solid-color="#7CB342"/>
    <!-- Lighter leaf for vein -->
    <solidColor id="leaf-light" solid-color="#9CCC65"/>
    <!-- Cream background (only for isolated preview; set transparent for overlay use) -->
    <solidColor id="cream" solid-color="#FAF0E6"/>
  </defs>

  <!-- Optional background circle for avatar/social use -->
  <rect x="0" y="0" width="400" height="500" fill="#FAF0E6" rx="0" id="bg"/>

  <!-- ===== LEAF (behind bag + handle) ===== -->
  <g id="leaf">
    <!-- Stem -->
    <path d="M 200 145
             C 200 120, 205 100, 215 85" 
          stroke="#558B2F" stroke-width="5" fill="none" stroke-linecap="round"/>
    
    <!-- Leaf body -->
    <path d="M 215 85
             C 195 70, 195 45, 215 30
             C 255 40, 275 70, 255 95
             C 245 105, 225 100, 215 85
             Z" 
          fill="#7CB342"/>
    
    <!-- Leaf vein (lighter arc) -->
    <path d="M 215 85
             C 225 75, 235 60, 245 50" 
          stroke="#9CCC65" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===== SHOPPING BAG (flat terracotta trapezoid) ===== -->
  <g id="bag">
    <!-- Main bag body -->
    <path d="M 120 160
             L 280 160
             L 310 340
             L 90 340
             Z" 
          fill="#C75B3A"/>

    <!-- Handle (arching over top) -->
    <path d="M 155 160
             C 155 110, 170 95, 200 95
             C 230 95, 245 110, 245 160" 
          stroke="#C75B3A" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- Handle attachment dots -->
    <circle cx="155" cy="160" r="6" fill="#8B3A22"/>
    <circle cx="245" cy="160" r="6" fill="#8B3A22"/>
  </g>

  <!-- ===== SERIF LETTER "L" (white, centered on bag) ===== -->
  <g id="letter-l" fill="#FFFFFF">
    <!-- Vertical stroke -->
    <path d="M 175 195
             L 195 195
             L 195 295
             L 235 295
             L 235 315
             L 175 315
             Z" />
    
    <!-- Top serif (slab) -->
    <path d="M 165 175
             L 205 175
             L 205 195
             L 165 195
             Z" />
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="200" y="400" 
        font-family="Montserrat, Inter, Arial Black, sans-serif" 
        font-size="48" 
        font-weight="800" 
        fill="#C75B3A" 
        text-anchor="middle"
        letter-spacing="6"
        id="wordmark">LUCKY STORE</text>
</svg>
