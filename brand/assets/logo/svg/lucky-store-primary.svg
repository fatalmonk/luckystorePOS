<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucky Store - Primary Logo (Option A) -->
<!-- Shopping bag with growing leaf + bold L -->
<!-- Safe for all backgrounds. Use inverted version on dark surfaces. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <!-- Terracotta accent -->
    <linearGradient id="bagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e88868"/>
      <stop offset="100%" stop-color="#dc5f3b"/>
    </linearGradient>
    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(28,25,23,0.12)"/>
    </filter>
  </defs>

  <!-- ===== BACKGROUND CIRCLE (optional mark-only) ===== -->
  <circle cx="100" cy="100" r="92" fill="#faf8f5" opacity="0" id="bg-circle"/>

  <!-- ===== SHOPPING BAG BODY ===== -->
  <g filter="url(#shadow)">
    <!-- Bag body -->
    <path d="M 40 85
             C 40 70, 50 65, 65 65
             L 135 65
             C 150 65, 160 70, 160 85
             L 165 165
             C 165 180, 155 190, 140 190
             L 60 190
             C 45 190, 35 180, 35 165
             Z" 
          fill="url(#bagGrad)"/>
    
    <!-- Bag highlight (subtle sheen) -->
    <path d="M 45 90
             L 50 160
             C 50 170, 55 175, 65 175
             L 70 175
             L 60 90
             Z" 
          fill="white" opacity="0.1"/>

    <!-- Bag opening fold -->
    <path d="M 40 85
             C 60 95, 80 95, 100 95
             C 120 95, 140 95, 160 85" 
          stroke="#c4542e" stroke-width="2" fill="none" opacity="0.3"/>

    <!-- ===== HANDLES ===== -->
    <path d="M 70 65
             C 70 40, 80 30, 90 30
             C 100 30, 110 40, 110 65" 
          stroke="#c4542e" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 90 30
             C 100 30, 110 40, 110 65" 
          stroke="#dc5f3b" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- ===== BOLD LETTER "L" ===== -->
    <text x="102" y="150" 
          font-family="Inter, system-ui, sans-serif" 
          font-size="52" 
          font-weight="800" 
          fill="white" 
          text-anchor="middle"
          letter-spacing="-2">L</text>

    <!-- ===== GROWING LEAF ===== -->
    <!-- Stem emerging from the bag -->
    <path d="M 130 170
             C 140 160, 145 145, 148 125" 
          stroke="#558B2F" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Leaf body -->
    <path d="M 148 125
             C 128 115, 128 95, 148 85
             C 168 95, 168 115, 148 125
             Z" 
          fill="url(#leafGrad)"/>
    
    <!-- Leaf vein -->
    <path d="M 148 125
             C 148 115, 148 105, 148 95" 
          stroke="#33691E" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Dewdrop on leaf -->
    <ellipse cx="155" cy="108" rx="2.5" ry="3.5" fill="white" opacity="0.6"/>
  </g>

  <!-- ===== WORDMARK (below mark) ===== -->
  <text x="100" y="225" 
        font-family="Inter, system-ui, sans-serif" 
        font-size="22" 
        font-weight="700" 
        fill="#1c1917" 
        text-anchor="middle"
        letter-spacing="1">LUCKY STORE</text>
  
  <!-- Tagline -->
  <text x="100" y="238" 
        font-family="Inter, system-ui, sans-serif" 
        font-size="9" 
        font-weight="500" 
        fill="#78716c" 
        text-anchor="middle"
        letter-spacing="2">FRESH TO YOUR DOOR</text>
</svg>
