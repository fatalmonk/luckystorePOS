<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucky Store — Inverse (Dark / Terracotta Backgrounds) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <solidColor id="cream" solid-color="#FAF0E6"/>
    <solidColor id="leaf" solid-color="#AED581"/>
    <solidColor id="leaf-light" solid-color="#C5E1A5"/>
  </defs>

  <rect x="0" y="0" width="400" height="500" fill="#C75B3A" rx="0" id="bg"/>

  <!-- Leaf (lighter green for dark bg contrast) -->
  <g id="leaf">
    <path d="M 200 145
             C 200 120, 205 100, 215 85" 
          stroke="#7CB342" stroke-width="5" fill="none" stroke-linecap="round"/>
    
    <path d="M 215 85
             C 195 70, 195 45, 215 30
             C 255 40, 275 70, 255 95
             C 245 105, 225 100, 215 85
             Z" 
          fill="#AED581"/>
    
    <path d="M 215 85
             C 225 75, 235 60, 245 50" 
          stroke="#C5E1A5" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Bag (cream/white on dark) -->
  <g id="bag">
    <path d="M 120 160
             L 280 160
             L 310 340
             L 90 340
             Z" 
          fill="#FAF0E6"/>

    <path d="M 155 160
             C 155 110, 170 95, 200 95
             C 230 95, 245 110, 245 160" 
          stroke="#FAF0E6" stroke-width="10" fill="none" stroke-linecap="round"/>

    <circle cx="155" cy="160" r="6" fill="#D7CCC8"/>
    <circle cx="245" cy="160" r="6" fill="#D7CCC8"/>
  </g>

  <!-- Serif L (terracotta on cream bag) -->
  <g id="letter-l" fill="#C75B3A">
    <path d="M 175 195
             L 195 195
             L 195 295
             L 235 295
             L 235 315
             L 175 315
             Z" />
    
    <path d="M 165 175
             L 205 175
             L 205 195
             L 165 195
             Z" />
  </g>

  <!-- Wordmark (cream on terracotta bg) -->
  <text x="200" y="400" 
        font-family="Montserrat, Inter, Arial Black, sans-serif" 
        font-size="48" 
        font-weight="800" 
        fill="#FAF0E6" 
        text-anchor="middle"
        letter-spacing="6">LUCKY STORE</text>
</svg>
