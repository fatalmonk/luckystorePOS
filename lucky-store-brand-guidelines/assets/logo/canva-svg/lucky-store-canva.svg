<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucky Store 1947 — Canva-Ready Logo (v2.0) -->
<!-- Import to Canva: Uploads > Upload files > Drag this SVG -->
<!-- Ungroup to edit individual layers -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">

  <!-- ===== WORDMARK: LUCKY ===== -->
  <text x="200" y="175"
        font-family="sans-serif"
        font-size="140"
        font-weight="800"
        fill="#1A1A1A"
        text-anchor="middle"
        letter-spacing="-4"
        id="line-lucky">LUCKY</text>

  <!-- ===== WORDMARK: ST RE ===== -->
  <text x="200" y="310"
        font-family="sans-serif"
        font-size="140"
        font-weight="800"
        fill="#1A1A1A"
        text-anchor="middle"
        letter-spacing="-4"
        id="line-store">ST    RE</text>

  <!-- ===== BRAND YELLOW DOT ===== -->
  <circle cx="200" cy="278" r="36" fill="#F5C518" id="dot-o"/>

  <!-- ===== YEAR: 1947 ===== -->
  <text x="200" y="370"
        font-family="monospace"
        font-size="32"
        font-weight="500"
        fill="#6B6B6B"
        text-anchor="middle"
        letter-spacing="8"
        id="year">1947</text>

</svg>