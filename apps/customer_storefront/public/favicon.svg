<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucky Store — Favicon/Icon (LS 1947 monogram on black rounded square) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Black rounded square background -->
  <rect x="50" y="50" width="300" height="300" rx="27" ry="27" fill="#000000"/>

  <!-- L — left vertical bar with bottom horizontal extension -->
  <g fill="#FCCE09">
    <!-- L vertical stem -->
    <rect x="110" y="110" width="33" height="155" rx="6" ry="6"/>
    <!-- L bottom foot (horizontal) -->
    <rect x="110" y="232" width="65" height="33" rx="6" ry="6"/>
  </g>

  <!-- S — stylized block letter on the right -->
  <g fill="#FCCE09">
    <!-- S top horizontal bar -->
    <rect x="171" y="110" width="100" height="30" rx="6" ry="6"/>
    <!-- S upper-left vertical -->
    <rect x="171" y="110" width="30" height="65" rx="6" ry="6"/>
    <!-- S middle horizontal -->
    <rect x="171" y="168" width="100" height="30" rx="6" ry="6"/>
    <!-- S lower-right vertical -->
    <rect x="241" y="168" width="30" height="65" rx="6" ry="6"/>
    <!-- S bottom horizontal bar -->
    <rect x="171" y="225" width="100" height="30" rx="6" ry="6"/>
  </g>

  <!-- 1947 — centered below LS monogram -->
  <text x="200" y="300" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="700"
        fill="#FCCE09" letter-spacing="1">1947</text>
</svg>