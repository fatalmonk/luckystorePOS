<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Near-black rounded square background -->
  <rect x="40" y="40" width="320" height="320" rx="64" ry="64" fill="#1A1A1A"/>
  
  <!-- Stylized bold geometric L -->
  <g transform="translate(140, 100)">
    <!-- Vertical stem -->
    <rect x="0" y="0" width="40" height="180" rx="8" ry="8" fill="#FFFFFF"/>
    <!-- Bottom foot -->
    <rect x="0" y="140" width="100" height="40" rx="8" ry="8" fill="#FFFFFF"/>
    
    <!-- Brand Yellow dot -->
    <circle cx="135" cy="160" r="20" fill="#F5C518"/>
  </g>
  
  <!-- 1947 in monospace style -->
  <text x="200" y="325" text-anchor="middle"
        font-family="monospace, Courier, monospace"
        font-size="28" font-weight="600"
        fill="#6B6B6B" letter-spacing="4">1947</text>
</svg>